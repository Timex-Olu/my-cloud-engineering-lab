services:
  web:
    image: nginx:latest
    container_name: my-professional-site
    ports:
      - "8080:80"
      - "443:443"
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs
    restart: always
